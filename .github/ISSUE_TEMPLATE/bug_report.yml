name: Bug report
description: Something doesn't work as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Do **not** paste real personal health data, keys, or exports."
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you run, and what went wrong?
      placeholder: "command + actual output"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "OS, Python version, Ollama version, Docker or local"
    validations:
      required: true
